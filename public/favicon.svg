<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Book body -->
  <rect x="13" y="14" width="30" height="36" rx="3" fill="url(#bookGrad)" filter="url(#shadow)"/>
  <!-- Book spine -->
  <rect x="13" y="14" width="6" height="36" rx="3" fill="#f59e0b"/>
  <!-- Page lines -->
  <line x1="23" y1="22" x2="38" y2="22" stroke="#d97706" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="27" x2="38" y2="27" stroke="#d97706" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="32" x2="38" y2="32" stroke="#d97706" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="37" x2="33" y2="37" stroke="#d97706" stroke-width="1.2" stroke-linecap="round"/>

  <!-- B badge -->
  <circle cx="44" cy="44" r="12" fill="#1c1917" opacity="0.88"/>
  <text x="44" y="49" text-anchor="middle" font-size="13" font-family="Georgia, serif" font-weight="bold" fill="#fde68a">B</text>
</svg>